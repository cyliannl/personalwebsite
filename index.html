<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cylian</title>
  <link rel="icon" type="image/webp" href="icons/favicon.webp?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111111;
      --card: #1a1a1a;
      --text: #f5f5f5;
      --muted: #b3b3b3;
      --border: #343434;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Inter", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .card {
      width: min(420px, 100%);
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 22px;
      padding: 28px;
      text-align: center;
      margin: 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1;
      letter-spacing: 0.2px;
      font-weight: 500;
    }

    .name-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .status-pill {
      height: 20px;
      width: 20px;
      border-radius: 999px;
      background: #1f1f1f;
      border: 1px solid #2b2b2b;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      position: relative;
      top: 1px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9a9a9a;
      display: block;
    }

    .meta {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .email a {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .local-time {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="name-row">
      <h1>Cylian</h1>
      <span class="status-pill" id="statusPill" aria-label="Discord status">
        <span class="status-dot" id="statusDot"></span>
      </span>
    </div>

    <div class="meta">
      <span class="email"><a href="mailto:hi@cylian.nl">hi@cylian.nl</a></span>
      <span>•</span>
      <span class="local-time" id="localTime">UTC+2 --:--:--</span>
    </div>

  </main>
  <script>
    const USER_ID = "830200981366112287";
    const API_URL = `https://api.lanyard.rest/v1/users/${USER_ID}`;

    async function updateStatus() {
      const pill = document.getElementById("statusPill");
      const dot = document.getElementById("statusDot");
      if (!pill || !dot) return;

      try {
        const res = await fetch(API_URL, { cache: "no-store" });
        const json = await res.json();
        const status = json?.data?.discord_status;
        const isOnline = status === "online" || status === "dnd" || status === "idle";

        if (isOnline) {
          pill.style.background = "#1f1f1f";
          pill.style.borderColor = "#2b2b2b";
          dot.style.background = "#30d158";
        } else {
          pill.style.background = "#1f1f1f";
          pill.style.borderColor = "#2b2b2b";
          dot.style.background = "#9a9a9a";
        }
      } catch (_) {
        pill.style.background = "#1f1f1f";
        pill.style.borderColor = "#2b2b2b";
        dot.style.background = "#9a9a9a";
      }
    }

    updateStatus();
    setInterval(updateStatus, 30000);

    function formatUtcPlus2Time() {
      const now = new Date();
      const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
      const utcPlus2 = new Date(utcMs + 2 * 60 * 60000);
      const hh = String(utcPlus2.getHours()).padStart(2, "0");
      const mm = String(utcPlus2.getMinutes()).padStart(2, "0");
      const ss = String(utcPlus2.getSeconds()).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    function updateLocalTime() {
      const el = document.getElementById("localTime");
      if (!el) return;
      el.textContent = `UTC+2 ${formatUtcPlus2Time()}`;
    }

    updateLocalTime();
    setInterval(updateLocalTime, 1000);
  </script>
</body>
</html>
